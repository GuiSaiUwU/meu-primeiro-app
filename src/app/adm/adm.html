<input [(ngModel)]="tarefa">
<button (click)="adicionarTarefas()" [disabled]="disabledButton">add tarefa</button>


@if (tarefas.length > 0) {
    <p>Tarefas:</p>
    @for (item of tarefas; track item) {
        <p>{{ item.id }} {{ item.descricao }}</p>
    }
} @else {
    <p>Tarefas vazias ;-; </p>
}
